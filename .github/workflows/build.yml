# This is a basic workflow that is manually triggered

name: Build Android Version

# Controls when the action will run. Workflow runs when manually triggered using the UI
# or API.
on:
  workflow_dispatch:
    # Inputs the workflow accepts.

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  buildEnvAndSetUpApp:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    steps:
      # Check out the code
      - uses: actions/checkout@v4

      # Build the custom Docker image
      - name: Build custom Docker image
        run: |
          docker build -t cordova-image .

      # Prepare environment and build the Cordova app
      - name: Prepare environment
        run: |
          rm -rf .github
          cd src
          docker run --rm -i -v $PWD:/workspace -w /workspace --privileged cordova-image cordova platform add android
          docker run --rm -i -v $PWD:/workspace -w /workspace --privileged cordova-image cordova plugin add cordova-plugin-screen-pinning
          docker run --rm -i -v $PWD:/workspace -w /workspace --privileged cordova-image cordova build

      # Move the built APK file to a known location
      - name: Move file up
        run: |
          cp "$(find . -name '*.apk')" ~/

      # Upload the built APK file as an artifact
      - uses: actions/upload-artifact@v4
        with:
          name: babby-paint-apk-file
          path: ~/*.apk
